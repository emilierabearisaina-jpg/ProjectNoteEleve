spring.application.name=FourrageEau

# Configuration de la base de donnees PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/fourrage_eau
spring.datasource.username=postgres
spring.datasource.password=emilie
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate (cree les tables automatiquement a partir des entites)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Port du serveur web par defaut
server.port=8080

# Configuration pour JSP
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
